<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        aside {
            background: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .banner {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .profile-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        section {
            margin-bottom: 20px;
            text-align: left;
        }

        main {
            padding: 20px;
            background: #f5f5f5;
        }

        .card {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input,
        textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 14px;
            background: #111;
            color: #fff;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            body {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <aside>
        <div class="banner">
            <input id="nome" placeholder="Seu nome" required>
        </div>

        <div class="profile-container">
            <img id="profileImage" src="./assets/images/profile.jpg" alt="Foto de perfil">
            <input type="file" id="upload" accept="image/jpeg">
        </div>

        <section>
            <h2>Contato</h2>
            <input id="celular" placeholder="(DDD) 99999-9999" pattern="\\(\\d{2}\\)\\s?\\d{4,5}-\\d{4}" required>
            <input id="email" type="email" placeholder="Email" required>
            <input id="linkedin" placeholder="LinkedIn" required>
            <input id="github" placeholder="GitHub" required>
        </section>

        <section>
            <h2>Habilidades</h2>
            <textarea id="habilidades" required></textarea>

            <h2>Especialidades</h2>
            <textarea id="especialidades" required></textarea>
        </section>

        <section>
            <h2>Tecnologias</h2>
            <textarea id="tecnologias" required></textarea>
        </section>

    </aside>

    <main>

        <div class="card">
            <h2>Resumo</h2>
            <textarea id="resumo" required></textarea>
        </div>

        <div class="card">
            <h2>Portfólio</h2>
            <textarea id="portfolio" required></textarea>
        </div>

        <div class="card">
            <h2>Experiência</h2>
            <textarea id="experiencia" required></textarea>
        </div>

        <div class="card">
            <h2>Cursos</h2>
            <textarea id="cursos" required></textarea>
        </div>

        <button onclick="gerarPDF()">Gerar PDF</button>

    </main>

    <script>
        let jsPDFInstance = null;
        let imagemBase64 = null;

        window.addEventListener('load', () => {
            if (window.jspdf && window.jspdf.jsPDF) {
                jsPDFInstance = window.jspdf.jsPDF;
            } else {
                alert('Erro ao carregar jsPDF.');
            }
        });

        const upload = document.getElementById('upload');
        const profileImage = document.getElementById('profileImage');

        upload.addEventListener('change', function () {
            const file = this.files[0];

            if (file && file.type !== 'image/jpeg') {
                alert('Apenas JPEG permitido');
                this.value = '';
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                alert('Imagem muito grande (máx 2MB)');
                this.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                imagemBase64 = e.target.result;
                profileImage.src = imagemBase64;
            }
            reader.readAsDataURL(file);
        });

        function validarCampos() {
            const campos = document.querySelectorAll('input[required], textarea[required]');

            for (let campo of campos) {
                if (!campo.value.trim()) {
                    alert('Preencha todos os campos obrigatórios');
                    campo.focus();
                    return false;
                }

                if (campo.pattern) {
                    const regex = new RegExp(campo.pattern);
                    if (!regex.test(campo.value)) {
                        alert('Formato inválido em: ' + campo.id);
                        campo.focus();
                        return false;
                    }
                }
            }

            return true;
        }

        function gerarPDF() {
            if (!validarCampos()) return;

            if (!jsPDFInstance) {
                alert('Erro jsPDF');
                return;
            }

            const doc = new jsPDFInstance();

            const nome = document.getElementById('nome').value;
            const celular = document.getElementById('celular').value;
            const email = document.getElementById('email').value;
            const linkedin = document.getElementById('linkedin').value;
            const github = document.getElementById('github').value;
            const habilidades = document.getElementById('habilidades').value;
            const especialidades = document.getElementById('especialidades').value;
            const tecnologias = document.getElementById('tecnologias').value;
            const resumo = document.getElementById('resumo').value;
            const portfolio = document.getElementById('portfolio').value;
            const experiencia = document.getElementById('experiencia').value;
            const cursos = document.getElementById('cursos').value;

            let y = 10;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.text(nome, 10, y);

            if (imagemBase64) {
                doc.addImage(imagemBase64, 'JPEG', 150, 10, 40, 40);
            }

            y += 15;

            function addSection(title, content) {
                y += 10;
                doc.setFont('helvetica', 'bold');
                doc.text(title, 10, y);
                y += 5;
                doc.setFont('helvetica', 'normal');

                const splitText = doc.splitTextToSize(content, 180);
                doc.text(splitText, 10, y);
                y += splitText.length * 5;

                if (y > 270) {
                    doc.addPage();
                    y = 10;
                }
            }

            addSection('Contato', `Celular: ${celular}\nEmail: ${email}\nLinkedIn: ${linkedin}\nGitHub: ${github}`);
            addSection('Habilidades', habilidades);
            addSection('Especialidades', especialidades);
            addSection('Tecnologias', tecnologias);
            addSection('Resumo', resumo);
            addSection('Portfólio', portfolio);
            addSection('Experiência', experiencia);
            addSection('Cursos', cursos);

            doc.save('portfolio.pdf');
        }
    </script>

</body>

</html>
