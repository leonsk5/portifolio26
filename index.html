<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        aside {
            background: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .banner {
            background: #222;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .profile-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        section {
            margin-bottom: 20px;
            text-align: left;
        }

        main {
            padding: 20px;
            background: #f5f5f5;
        }

        .card {
            background: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input,
        textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 10px;
            background: #111;
            color: #fff;
            border: none;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>

<body>

    <aside>
        <div class="banner">
            <input id="nome" placeholder="Seu nome">
        </div>

        <div class="profile-container">
            <img id="profileImage" src="https://via.placeholder.com/120">
            <input type="file" id="upload">
        </div>

        <section>
            <h2>Contato</h2>
            <input id="email" placeholder="Email">
            <input id="linkedin" placeholder="LinkedIn">
            <input id="github" placeholder="GitHub">
        </section>

        <section>
            <h2>Habilidades</h2>
            <textarea id="habilidades"></textarea>

            <h2>Especialidades</h2>
            <textarea id="especialidades"></textarea>
        </section>

        <section>
            <h2>Tecnologias</h2>
            <textarea id="tecnologias"></textarea>
        </section>

    </aside>

    <main>

        <div class="card">
            <h2>Resumo</h2>
            <textarea id="resumo"></textarea>
        </div>

        <div class="card">
            <h2>Portfólio</h2>
            <textarea id="portfolio"></textarea>
        </div>

        <div class="card">
            <h2>Experiência</h2>
            <textarea id="experiencia"></textarea>
        </div>

        <div class="card">
            <h2>Cursos</h2>
            <textarea id="cursos"></textarea>
        </div>

        <button onclick="salvarTXT()">Salvar em TXT</button>

    </main>

    <script>
        const upload = document.getElementById('upload');
        const profileImage = document.getElementById('profileImage');

        upload.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => profileImage.src = e.target.result;
                reader.readAsDataURL(file);
            }
        });

        function salvarTXT() {
            const dados = `
Nome: ${document.getElementById('nome').value}
Email: ${document.getElementById('email').value}
LinkedIn: ${document.getElementById('linkedin').value}
GitHub: ${document.getElementById('github').value}

Habilidades:
${document.getElementById('habilidades').value}

Especialidades:
${document.getElementById('especialidades').value}

Tecnologias:
${document.getElementById('tecnologias').value}

Resumo:
${document.getElementById('resumo').value}

Portfólio:
${document.getElementById('portfolio').value}

Experiência:
${document.getElementById('experiencia').value}

Cursos:
${document.getElementById('cursos').value}
`;

            const blob = new Blob([dados], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'portfolio.txt';
            link.click();
        }
    </script>

</body>

</html>
